<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reading Practice — LearnSmart</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=Merriweather:ital,wght@0,300;0,400;1,300;1,400&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase.js"></script>
<script src="reading_data.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F5F0; --bg2: #EEEAE2; --bg3: #E5E0D5;
  --surface: #FFFFFF; --border: #DDD8CE; --border2: #CBC5B8;
  --text1: #1A1714; --text2: #5C5751; --text3: #9C9590;
  --accent: #C84B2F; --accent-bg: #FDF0EC; --accent-border: #F0BFB3;
  --green: #2D6A3F; --green-bg: #EAF4EE; --green-border: #A8D4B5;
  --red: #A32828; --red-bg: #FCEAEA; --red-border: #E0AAAA;
  --blue: #2B5BA8; --blue-bg: #EBF0FB; --blue-border: #A8BDE8;
  --chain-bg: #EEEDFE; --chain-text: #3C3489;
  --radius: 12px; --radius-sm: 8px;
  --shadow: 0 1px 3px rgba(0,0,0,0.06);
  --shadow-md: 0 4px 16px rgba(0,0,0,0.08);
}
body { font-family: 'DM Sans', sans-serif; background: var(--bg); color: var(--text1); min-height: 100vh; font-size: 15px; }

.screen { display: none; }
.screen.active { display: block; }

/* NAV */
.top-nav { background: var(--surface); border-bottom: 1px solid var(--border); padding: 0 1.5rem; display: flex; align-items: center; gap: 10px; height: 54px; position: sticky; top: 0; z-index: 200; }
.nav-brand { font-family: 'Instrument Serif', serif; font-size: 20px; color: var(--text1); letter-spacing: -0.3px; text-decoration: none; }
.nav-brand span { color: var(--accent); }
.nav-divider { width: 1px; height: 20px; background: var(--border); }
.nav-label { font-size: 13px; color: var(--text2); font-weight: 500; }
.nav-spacer { flex: 1; }
.nav-btn { font-size: 12.5px; padding: 5px 13px; border-radius: 20px; border: 1px solid var(--border); background: transparent; color: var(--text2); cursor: pointer; font-family: 'DM Sans', sans-serif; font-weight: 500; transition: all 0.12s; text-decoration: none; display: inline-flex; align-items: center; gap: 5px; }
.nav-btn:hover { background: var(--bg2); color: var(--text1); }
.user-av { width: 32px; height: 32px; border-radius: 50%; border: 2px solid var(--border); background: var(--bg2); display: flex; align-items: center; justify-content: center; font-size: 13px; color: var(--text2); overflow: hidden; flex-shrink: 0; }
.user-av img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }

/* DASHBOARD */
.dash-wrap { max-width: 680px; margin: 0 auto; padding: 2rem 1.5rem; }
.dash-hero { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 2rem; margin-bottom: 1.75rem; box-shadow: var(--shadow-md); }
.dash-greeting { font-family: 'Instrument Serif', serif; font-size: 26px; color: var(--text1); letter-spacing: -0.4px; margin-bottom: 4px; }
.dash-sub { font-size: 13px; color: var(--text3); margin-bottom: 1.5rem; }

.week-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 8px; margin-bottom: 1.5rem; }
.day-cell { background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 10px 6px; text-align: center; }
.day-cell.today  { border-color: var(--accent); background: var(--accent-bg); }
.day-cell.done   { background: var(--green-bg); border-color: var(--green-border); }
.day-cell.locked { opacity: 0.4; }
.day-cell-num    { font-size: 11px; font-weight: 600; color: var(--text3); text-transform: uppercase; letter-spacing: .06em; margin-bottom: 4px; }
.day-cell.today  .day-cell-num { color: var(--accent); }
.day-cell.done   .day-cell-num { color: var(--green); }
.day-cell-status { font-size: 10px; color: var(--text3); }
.day-cell.done   .day-cell-status { color: var(--green); }
.day-cell.today  .day-cell-status { color: var(--accent); }

.start-btn { width: 100%; padding: 12px; background: var(--text1); color: var(--surface); border: none; border-radius: var(--radius-sm); font-family: 'DM Sans', sans-serif; font-size: 14px; font-weight: 500; cursor: pointer; transition: background 0.15s; }
.start-btn:hover { background: var(--accent); }
.start-btn:disabled { opacity: 0.4; cursor: default; background: var(--text1); }

.section-label { font-size: 11px; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; color: var(--text3); margin-bottom: 0.75rem; }
.session-history { display: flex; flex-direction: column; gap: 8px; }
.hist-row { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 14px; display: flex; align-items: center; gap: 14px; }
.hist-day   { font-family: 'DM Mono', monospace; font-size: 11px; font-weight: 500; color: var(--text3); min-width: 60px; }
.hist-type  { font-size: 10px; padding: 2px 8px; border-radius: 20px; background: var(--bg2); color: var(--text3); }
.hist-type.recall { background: var(--chain-bg); color: var(--chain-text); }
.hist-scores { display: flex; gap: 10px; flex: 1; flex-wrap: wrap; }
.hist-score { font-size: 12px; color: var(--text2); }
.hist-score span { font-weight: 600; color: var(--text1); }
.hist-time  { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--text3); }

/* EXERCISE SCREEN */
.ex-wrap { max-width: 1050px; margin: 0 auto; padding: 2rem 4rem; }
.ex-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 3rem; }
.ex-meta { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .1em; color: var(--text3); text-transform: uppercase; }
.ex-phase { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); text-transform: uppercase; margin-top: 5px; }
.ex-timer { font-family: 'DM Mono', monospace; font-size: 22px; font-weight: 500; color: var(--text1); letter-spacing: .04em; text-align: right; }
.ex-timer.warn { color: #BA7517; }
.ex-timer.over { color: var(--red); }
.ex-timer-lbl { font-family: 'DM Mono', monospace; font-size: 9px; color: var(--text3); text-align: right; margin-top: 2px; text-transform: uppercase; }

/* PROGRESS STEPS */
.steps-bar { display: flex; gap: 6px; margin-bottom: 2.5rem; }
.step { flex: 1; height: 3px; background: var(--border); border-radius: 2px; transition: background .3s; }
.step.done    { background: var(--green); }
.step.current { background: var(--accent); }
.step.active  { background: var(--text1); }

/* CHAIN / BLOCKS */
.block-row { display: grid; grid-template-columns: 150px 1fr 1fr; gap: 0 2.5rem; align-items: start; opacity: 0; transform: translateY(12px); }
.block-row.in { animation: blockIn .45s cubic-bezier(.22,.68,0,1.2) forwards; }
.col-node { display: flex; justify-content: flex-end; padding-top: 3px; }
.node-pill { font-family: 'DM Mono', monospace; font-size: 8.5px; font-weight: 500; color: var(--chain-text); background: var(--chain-bg); border-radius: 3px; padding: 3px 9px; letter-spacing: .1em; text-transform: uppercase; opacity: 0; white-space: nowrap; }
.node-pill.pop { animation: pillFade .35s ease forwards; }
.col-en { font-family: 'Merriweather', serif; font-size: 14px; line-height: 1.95; color: var(--text1); font-weight: 300; padding-top: 2px; }
.col-hi { font-family: 'DM Mono', monospace; font-size: 9.5px; color: var(--text3); line-height: 1.75; padding-top: 3px; }
.hint-lbl { color: #7F77DD; margin-right: 4px; }

.block-sep { display: grid; grid-template-columns: 150px 1fr 1fr; gap: 0 2.5rem; margin: 2.5rem 0; opacity: 0; }
.block-sep.show { animation: fadeUp .4s ease forwards; }
.sep-line { width: 55%; height: 1px; background: linear-gradient(to right, transparent, #C8C5E8 30%, #C8C5E8 70%, transparent); margin: 0 auto; }

.divider { height: 0.5px; background: var(--border); margin: 2.5rem 0 1.75rem; opacity: 0; }
.divider.in { animation: divSlide .5s ease forwards; }

.fc-wrap { padding: 1rem 1.3rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2); margin-bottom: 1.5rem; opacity: 0; }
.fc-wrap.in { animation: slideUp .45s ease forwards; }
.fc-label { font-family: 'DM Mono', monospace; font-size: 8.5px; letter-spacing: .1em; color: var(--text3); text-transform: uppercase; margin-bottom: 9px; }
.fc-flow { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; }
.fc-node { font-family: 'DM Mono', monospace; font-size: 8.5px; font-weight: 500; background: var(--chain-bg); color: var(--chain-text); border-radius: 3px; padding: 3px 9px; text-transform: uppercase; letter-spacing: .08em; }
.fc-arr  { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); }

/* RECALL */
.recall-wrap { opacity: 0; animation: slideUp .4s ease forwards; }
.recall-lbl { font-family: 'DM Mono', monospace; font-size: 8.5px; letter-spacing: .1em; color: var(--text3); text-transform: uppercase; margin-bottom: 14px; }
.chain-flow { display: flex; flex-wrap: wrap; align-items: center; gap: 8px; margin-bottom: 16px; }
.cn-given { font-family: 'DM Mono', monospace; font-size: 8.5px; font-weight: 500; background: var(--chain-bg); color: var(--chain-text); border-radius: 3px; padding: 3px 9px; text-transform: uppercase; letter-spacing: .08em; }
.cn-blank { font-family: 'DM Mono', monospace; font-size: 10px; background: var(--surface); border: 1px solid var(--border); border-radius: 3px; padding: 4px 8px; width: 130px; color: var(--text1); outline: none; }
.cn-blank:focus { border-color: #7F77DD; }
.cn-arr  { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); }

.result-box { display: none; margin-top: 1rem; border: 1px solid var(--border); border-radius: var(--radius); padding: 1.2rem; background: var(--bg2); }
.result-box.show { display: block; animation: slideUp .35s ease forwards; }
.rr { display: flex; align-items: baseline; gap: 10px; font-family: 'DM Mono', monospace; font-size: 10px; padding: 5px 0; border-bottom: 0.5px solid var(--border); flex-wrap: wrap; }
.rr:last-of-type { border-bottom: none; }
.rr-lbl  { color: var(--text3); min-width: 60px; }
.rr-user { color: var(--text1); flex: 1; }
.rr-ok   { color: var(--green); font-weight: 500; }
.rr-no   { color: var(--red); font-weight: 500; }
.rr-ans  { color: var(--text3); font-size: 9px; }
.score-big { font-family: 'DM Mono', monospace; font-size: 19px; font-weight: 500; color: var(--text1); margin-top: 12px; }

.recall-day-banner { background: var(--chain-bg); border: 1px solid #C8C5E8; border-radius: var(--radius-sm); padding: 8px 14px; font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: .08em; text-transform: uppercase; color: var(--chain-text); margin-bottom: 1.5rem; display: inline-block; }

/* ANALYSIS */
.an-title { font-family: 'DM Mono', monospace; font-size: 10px; letter-spacing: .1em; color: var(--text3); text-transform: uppercase; margin-bottom: 2rem; }
.score-row { display: flex; align-items: baseline; gap: 1.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border); margin-bottom: 2rem; }
.score-huge { font-family: 'DM Mono', monospace; font-size: 36px; font-weight: 500; color: var(--text1); }
.score-sub  { font-family: 'DM Mono', monospace; font-size: 10px; color: var(--text3); line-height: 2; }
.an-block { margin-bottom: 2rem; }
.an-q-text { font-family: 'Merriweather', serif; font-size: 13.5px; line-height: 1.75; font-weight: 300; color: var(--text1); margin-bottom: 12px; }
.an-opts { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; max-width: 580px; }
.an-opt { display: flex; align-items: flex-start; gap: 10px; padding: 9px 12px; border-radius: var(--radius-sm); font-family: 'DM Mono', monospace; font-size: 10px; line-height: 1.6; border: 1px solid var(--border); }
.an-opt.correct { border-color: var(--green-border); background: var(--green-bg); color: #085041; }
.an-opt.wrong   { border-color: var(--red-border);   background: var(--red-bg);   color: #4A1B0C; }
.an-opt.neutral { background: var(--bg2); }
.an-key { font-weight: 500; min-width: 14px; flex-shrink: 0; margin-top: 1px; color: var(--text3); }
.an-opt.correct .an-key { color: var(--green); }
.an-opt.wrong   .an-key { color: var(--red); }
.an-reason { font-family: 'DM Mono', monospace; font-size: 9.5px; line-height: 1.75; color: var(--text2); padding: 10px 14px; border-left: 2px solid var(--green-border); background: var(--bg2); border-radius: 0 var(--radius-sm) var(--radius-sm) 0; max-width: 580px; }
.an-divider { height: 0.5px; background: var(--border); margin: 1.75rem 0; }
.time-tbl { font-family: 'DM Mono', monospace; font-size: 9.5px; color: var(--text3); line-height: 2; padding: 1rem 1.3rem; border: 1px solid var(--border); border-radius: var(--radius); background: var(--bg2); display: inline-block; min-width: 260px; margin-top: 1.5rem; }
.tl { display: inline-block; min-width: 150px; }
.tv { color: var(--text1); font-weight: 500; }
.ex-section-hd { font-family: 'DM Mono', monospace; font-size: 9px; letter-spacing: .12em; text-transform: uppercase; color: var(--chain-text); background: var(--chain-bg); border: 1px solid #C8C5E8; border-radius: var(--radius-sm); padding: 6px 12px; display: inline-block; margin-bottom: 1.5rem; }

/* BUTTONS */
.rd-btn { font-family: 'DM Mono', monospace; font-size: 10px; background: transparent; border: 0.5px solid var(--border2); border-radius: 6px; padding: 8px 20px; cursor: pointer; color: var(--text1); letter-spacing: .04em; opacity: 0; display: inline-block; }
.rd-btn.in { animation: slideUp .4s ease forwards; }
.rd-btn:hover { background: var(--bg2); }
.rd-btn.solid { background: var(--text1); color: var(--surface); border-color: var(--text1); opacity: 1; }
.rd-btn.solid:hover { background: var(--accent); border-color: var(--accent); }

/* LOADING */
.loading-state { text-align: center; padding: 4rem 2rem; }
.spinner { width: 28px; height: 28px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; margin: 0 auto 1rem; }
.empty-state { text-align: center; padding: 4rem 2rem; }
.empty-icon { font-size: 2rem; margin-bottom: 1rem; opacity: .4; }
.empty-text { font-size: 14px; color: var(--text3); }

@keyframes blockIn  { to { opacity: 1; transform: translateY(0); } }
@keyframes fadeUp   { to { opacity: 1; } }
@keyframes pillFade { to { opacity: 1; } }
@keyframes divSlide { from { opacity:0; transform:scaleX(0); transform-origin:left; } to { opacity:1; transform:scaleX(1); } }
@keyframes slideUp  { from { opacity:0; transform:translateY(10px); } to { opacity:1; transform:translateY(0); } }
@keyframes spin     { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<nav class="top-nav">
  <a class="nav-brand" href="index.html">Learn<span>Smart</span></a>
  <div class="nav-divider"></div>
  <span class="nav-label" id="nav-label">Reading Practice</span>
  <div class="nav-spacer"></div>
  <a class="nav-btn" href="index.html"><i class="ti ti-home"></i> Home</a>
  <div class="user-av" id="user-av"></div>
</nav>

<!-- DASHBOARD -->
<div id="screen-dashboard" class="screen">
  <div class="dash-wrap">
    <div class="dash-hero">
      <div class="dash-greeting" id="dash-greeting">Reading Practice</div>
      <div class="dash-sub" id="dash-sub">Loading…</div>
      <div class="week-grid" id="week-grid"></div>
      <button class="start-btn" id="start-btn" onclick="startSession()" disabled>Loading…</button>
    </div>
    <div class="section-label">Recent Sessions</div>
    <div class="session-history" id="session-history">
      <div class="loading-state"><div class="spinner"></div></div>
    </div>
  </div>
</div>

<!-- EXERCISE -->
<div id="screen-exercise" class="screen">
  <div class="ex-wrap">
    <div class="ex-header">
      <div>
        <div class="ex-meta" id="ex-meta">Reading Practice</div>
        <div class="ex-phase" id="ex-phase"></div>
      </div>
      <div>
        <div class="ex-timer" id="ex-timer">0:00</div>
        <div class="ex-timer-lbl" id="ex-timer-lbl"></div>
      </div>
    </div>
    <div class="steps-bar" id="steps-bar"></div>
    <div id="ex-content"></div>
  </div>
</div>

<script>
/* ════════════════════════════════════════════════════════════
   STATE
════════════════════════════════════════════════════════════ */
let currentUser = null;
let userState   = null;
let sess        = {};

/* ════════════════════════════════════════════════════════════
   INIT
════════════════════════════════════════════════════════════ */
(async () => {
  while (!window._supa) await new Promise(r => setTimeout(r, 30));
  currentUser = await rdGetUser();
  if (!currentUser) { window.location.href = 'auth.html'; return; }

  const av     = document.getElementById('user-av');
  const avatar = currentUser.user_metadata?.avatar_url;
  const name   = (currentUser.user_metadata?.full_name || currentUser.email || '?').split(' ')[0];
  av.innerHTML = avatar ? `<img src="${avatar}" alt="${name}">` : name[0].toUpperCase();

  userState = await rdGetState(currentUser.id);
  await renderDashboard();
  showScreen('dashboard');
})();

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

/* ════════════════════════════════════════════════════════════
   DASHBOARD
════════════════════════════════════════════════════════════ */
async function renderDashboard() {
  const day  = userState.current_day;
  const week = userState.current_week;
  const name = (currentUser.user_metadata?.full_name || 'there').split(' ')[0];
  const hr   = new Date().getHours();
  document.getElementById('dash-greeting').textContent =
    `${hr < 12 ? 'Good morning' : hr < 17 ? 'Good afternoon' : 'Good evening'}, ${name}`;
  document.getElementById('dash-sub').textContent = `Week ${week} · Day ${day} · Reading Practice`;

  const sessions = await rdGetUserSessions(currentUser.id);

  const grid = document.getElementById('week-grid');
  grid.innerHTML = '';
  for (let d = 1; d <= 7; d++) {
    const done     = sessions.some(s => s.day === d && s.week === week);
    const isToday  = d === day;
    const locked   = d > day;
    const isRecall = [2, 4, 6, 7].includes(d);
    const cell     = document.createElement('div');
    cell.className = 'day-cell' + (done ? ' done' : isToday ? ' today' : locked ? ' locked' : '');
    cell.innerHTML = `<div class="day-cell-num">D${d}${isRecall ? ' 🔁' : ''}</div>
      <div class="day-cell-status">${done ? '✓' : isToday ? 'today' : locked ? '—' : '·'}</div>`;
    grid.appendChild(cell);
  }

  const btn   = document.getElementById('start-btn');
  const today = new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' });
  const done  = sessions.some(s =>
    (s.day === day && s.week === week) ||
    new Date(s.created_at).toLocaleDateString('en-CA', { timeZone: 'Asia/Kolkata' }) === today
  );

  if (done) {
    btn.textContent = 'Done for today — see you tomorrow!';
    btn.disabled    = true;
  } else {
    btn.textContent = `Start Day ${day} →`;
    btn.disabled    = false;
  }

  renderSessionHistory(sessions);
}
function renderSessionHistory(sessions) {
  const el = document.getElementById('session-history');
  if (!sessions.length) {
    el.innerHTML = '<div class="empty-state"><div class="empty-icon">📖</div><div class="empty-text">No sessions yet — start your first session above.</div></div>';
    return;
  }
  el.innerHTML = sessions.slice(0, 7).map(s => `
    <div class="hist-row">
      <div class="hist-day">W${s.week} D${s.day}</div>
      <span class="hist-type ${s.session_type === 'recall' ? 'recall' : ''}">${s.session_type || 'normal'}</span>
      <div class="hist-scores">
        ${s.ex1_score != null ? `<div class="hist-score">Ex1 <span>${s.ex1_score}%</span></div>` : ''}
        ${s.ex2_score != null ? `<div class="hist-score">Ex2 <span>${s.ex2_score}%</span></div>` : ''}
      </div>
      <div class="hist-time">${fmt(s.total_time || 0)}</div>
    </div>`).join('');
}

/* ════════════════════════════════════════════════════════════
   SESSION START
════════════════════════════════════════════════════════════ */
async function startSession() {
  const btn = document.getElementById('start-btn');
  btn.textContent = 'Loading…';
  btn.disabled    = true;

  const day         = userState.current_day;
  const week        = userState.current_week;
  const isRecallDay = [2, 4, 6, 7].includes(day);

  const dayEx  = await rdGetExercise(week, day, currentUser.id);
  const day1Ex = (day === 1) ? dayEx : await rdGetExercise(week, 1, currentUser.id);

  if (!dayEx) {
    btn.textContent = 'No exercise uploaded for today yet.';
    btn.disabled    = false;
    return;
  }
  if (isRecallDay && !day1Ex) {
    btn.textContent = 'Day 1 exercise missing — cannot run recall.';
    btn.disabled    = false;
    return;
  }

  sess = {
    day, week, isRecallDay,
    dayEx, day1Ex,
    stepIndex:  0,
    steps:      buildSteps(day, isRecallDay),
    startTime:  Date.now(),
    phaseStart: Date.now(),
    phaseTimes: {},
    questionResults: [],

    // Ex1 scores — today's recall
    ex1Correct: 0, ex1Total: 0, ex1Score: null,

    // Ex1 scores — day 1 recall (null until set on recall days)
    ex1D1Correct: null, ex1D1Total: null, ex1D1Score: null,

    // Ex2 scores — today's questions
    ex2Correct: 0, ex2Total: 0, ex2Score: null,

    // Ex2 scores — day 1 recall questions (null until set on recall days)
    ex2D1Correct: null, ex2D1Total: null, ex2D1Score: null,

    // results arrays for review in analysis
    _activeQuestions:       [],
    _activeRecallQuestions: [],
    _ex2Results:            [],
    _ex2RecallResults:      [],
  };

  document.getElementById('ex-meta').textContent  = `${dayEx.topic} · Week ${week} Day ${day}`;
  document.getElementById('nav-label').textContent = dayEx.topic;

  renderStepsBar();
  showScreen('exercise');
  startTimer();
  runStep();
}

/* ════════════════════════════════════════════════════════════
   STEP ROUTING
════════════════════════════════════════════════════════════ */
function buildSteps(day, isRecallDay) {
  if (day === 1)    return ['ex1-read', 'ex1-recall', 'ex2-questions', 'analysis'];
  if (!isRecallDay) return ['ex1-read-day', 'ex1-recall-day', 'ex2-questions-day', 'analysis'];
  return ['ex1-recall-d1', 'ex1-read-day', 'ex1-recall-day', 'ex2-recall-d1', 'ex2-questions-day', 'analysis'];
}

function renderStepsBar() {
  const bar = document.getElementById('steps-bar');
  bar.innerHTML = sess.steps.map((_, i) => `<div class="step" id="step-${i}"></div>`).join('');
  updateStepsBar();
}

function updateStepsBar() {
  sess.steps.forEach((_, i) => {
    const el = document.getElementById('step-' + i);
    if (!el) return;
    el.className = 'step ' + (i < sess.stepIndex ? 'done' : i === sess.stepIndex ? 'active' : '');
  });
}

function nextStep() {
  sess.phaseTimes[sess.steps[sess.stepIndex]] = Math.floor((Date.now() - sess.phaseStart) / 1000);
  sess.stepIndex++;
  sess.phaseStart = Date.now();
  updateStepsBar();
  runStep();
}

function runStep() {
  const step    = sess.steps[sess.stepIndex];
  const content = document.getElementById('ex-content');
  content.innerHTML = '';
  setPhase(step);

  switch (step) {
    case 'ex1-read':          return buildEx1Read(sess.dayEx);
    case 'ex1-read-day':      return buildEx1Read(sess.dayEx);
    case 'ex1-recall':        return buildEx1Recall(sess.dayEx,  false, false);
    case 'ex1-recall-day':    return buildEx1Recall(sess.dayEx,  false, false);
    case 'ex1-recall-d1':     return buildEx1Recall(sess.day1Ex, true,  true);
    case 'ex2-questions':     return buildEx2(sess.dayEx, sess.day);
    case 'ex2-questions-day': return buildEx2(sess.dayEx, sess.day);
    case 'ex2-recall-d1':     return buildEx2RecallD1(sess.day1Ex, sess.day);
    case 'analysis':          return buildAnalysis();
  }
}

/* ════════════════════════════════════════════════════════════
   EX1 — READING
════════════════════════════════════════════════════════════ */
function buildEx1Read(ex) {
  const blocks  = ex.ex1_blocks || [];
  const content = document.getElementById('ex-content');
  let html = '';

  blocks.forEach((b, i) => {
    const delay = 100 + i * 170;
    html += `<div class="block-row" data-delay="${delay}">
      <div class="col-node"><div class="node-pill" data-pill>${b.node || ''}</div></div>
      <div class="col-en">${b.en || ''}</div>
      <div class="col-hi"><span class="hint-lbl">यानी —</span>${b.hi || ''}</div>
    </div>`;
    if (i < blocks.length - 1) {
      html += `<div class="block-sep" data-sep><div></div><div><div class="sep-line"></div></div><div></div></div>`;
    }
  });

  html += `<div class="divider" id="ex-divider"></div>
    <div class="fc-wrap" id="ex-fc">
      <div class="fc-label">full chain</div>
      <div class="fc-flow">${blocks.map((b, i) =>
        `<span class="fc-node">${b.node || ''}</span>${i < blocks.length - 1 ? '<span class="fc-arr">→</span>' : ''}`
      ).join('')}</div>
    </div>
    <button class="rd-btn" id="read-next" onclick="nextStep()">done reading — next ↓</button>`;

  content.innerHTML = html;
  animateBlocks(blocks.length);
}

function animateBlocks(count) {
  const rows = document.querySelectorAll('.block-row');
  const seps = document.querySelectorAll('.block-sep');
  rows.forEach((row, i) => {
    const delay = parseInt(row.dataset.delay) || 100;
    setTimeout(() => {
      row.classList.add('in');
      const pill = row.querySelector('[data-pill]');
      if (pill) setTimeout(() => pill.classList.add('pop'), 120);
      if (seps[i]) setTimeout(() => seps[i].classList.add('show'), 260);
    }, delay);
  });
  const last = 100 + (count - 1) * 170;
  setTimeout(() => document.getElementById('ex-divider')?.classList.add('in'), last + 320);
  setTimeout(() => document.getElementById('ex-fc')?.classList.add('in'), last + 500);
  setTimeout(() => document.getElementById('read-next')?.classList.add('in'), last + 660);
}

/* ════════════════════════════════════════════════════════════
   EX1 — RECALL
════════════════════════════════════════════════════════════ */
function buildEx1Recall(ex, showBanner, isD1recall) {
  const blocks = ex.ex1_blocks || [];
  let blankPositions;

  if (isD1recall) {
    const b = (ex.ex1_recall_blanks || {})[String(sess.day)];
    blankPositions = (b !== undefined && b !== null) ? [b] : [];
  } else if (sess.day === 1) {
    blankPositions = (ex.ex1_blank_pos !== null && ex.ex1_blank_pos !== undefined)
      ? [ex.ex1_blank_pos] : [];
  } else {
    blankPositions = ex.ex1_blank_positions || [];
  }

  let flowHtml = '';
  blocks.forEach((b, i) => {
    if (i > 0) flowHtml += '<span class="cn-arr">→</span>';
    if (blankPositions.includes(i)) {
      flowHtml += `<input class="cn-blank" id="blank-${i}" placeholder="_ _ _" autocomplete="off" />`;
    } else {
      flowHtml += `<span class="cn-given">${b.node || ''}</span>`;
    }
  });

  const div = document.createElement('div');
  div.className = 'recall-wrap';
  div.innerHTML = `
    ${showBanner ? `<div class="recall-day-banner">🔁 Day 1 Chain Recall</div>` : ''}
    <div class="recall-lbl">fill the chain — from memory</div>
    <div class="chain-flow">${flowHtml}</div>
    <button class="rd-btn solid" id="recall-submit"
      onclick="submitEx1Recall(${JSON.stringify(blankPositions)}, ${isD1recall})">submit</button>
    <div class="result-box" id="recall-result"></div>`;
  document.getElementById('ex-content').appendChild(div);

  const first = div.querySelector('.cn-blank');
  if (first) setTimeout(() => first.focus(), 400);
}

function submitEx1Recall(blankPositions, isD1recall) {
  const ex     = isD1recall ? sess.day1Ex : sess.dayEx;
  const blocks = ex.ex1_blocks || [];
  let correct  = 0;
  let html     = '';

  // Collect per-blank answers BEFORE reading input values
  const answers = blankPositions.map(i => {
    const inp = document.getElementById('blank-' + i);
    const val = inp ? inp.value.trim() : '';
    const ok  = closeEnough(val, blocks[i]?.node || '');
    if (ok) correct++;
    return {
      node_idx:       i,
      user_answer:    val,
      correct_answer: blocks[i]?.node || '',
      ok,
    };
  });

  // Store on session object
  if (isD1recall) {
    sess.ex1D1Answers = answers;
  } else {
    sess.ex1Answers   = answers;
  }

  // Build result HTML
  answers.forEach(a => {
    html += `<div class="rr">
      <span class="rr-lbl">node ${a.node_idx + 1}</span>
      <span class="rr-user">${a.user_answer || '—'}</span>
      <span class="${a.ok ? 'rr-ok' : 'rr-no'}">${a.ok ? '✓' : '✗'}</span>
      ${!a.ok ? `<span class="rr-ans">→ ${a.correct_answer}</span>` : ''}
    </div>`;
  });

  const pct = blankPositions.length
    ? Math.round(correct / blankPositions.length * 100) : 100;

  if (isD1recall) {
    sess.ex1D1Correct = correct;
    sess.ex1D1Total   = blankPositions.length;
    sess.ex1D1Score   = pct;
  } else {
    sess.ex1Correct = correct;
    sess.ex1Total   = blankPositions.length;
    sess.ex1Score   = pct;
  }

  html += `<div class="score-big">${pct}%  ${correct}/${blankPositions.length}</div>`;

  const box = document.getElementById('recall-result');
  box.innerHTML = html;
  box.classList.add('show');

  const cont         = document.createElement('button');
  cont.className     = 'rd-btn solid';
  cont.style.marginTop = '14px';
  cont.textContent   = 'continue →';
  cont.onclick       = nextStep;
  box.appendChild(cont);
  document.getElementById('recall-submit').style.display = 'none';
}

/* ════════════════════════════════════════════════════════════
   EX2 — TODAY'S QUESTIONS  (uses Ex2Screen)
════════════════════════════════════════════════════════════ */
function buildEx2(ex, day) {
  const questions = getQuestionsForDay(ex, day);
  sess._activeQuestions = questions;

  Ex2Screen.start({
    questions: questions,
    passage:   ex.ex2_passage || null,
    isRecall:  false,
    onComplete: (results) => {
      sess._ex2Results = results;
      sess.questionResults.push(...results.map(r => ({ 
        ...r, 
        week:          sess.week, 
        day:           sess.day,
        exercise_type: 'ex2',
        is_recall:     false,
      })));
      let correct = 0;
      results.forEach(r => { if (r.correct) correct++; });
      sess.ex2Correct = correct;
      sess.ex2Total   = results.length;
      sess.ex2Score   = results.length ? Math.round(correct / results.length * 100) : 100;
      nextStep();
    }
  });
}

// AFTER
function getQuestionsForDay(ex, day) {
  const qs = ex.ex2_questions || [];
  if (day !== 1) return qs;
  const map             = ex.ex2_recall_map || {};
  const assignedIndices = new Set(Object.values(map).flat().map(Number));
  const day1Qs          = qs.filter((_, i) => !assignedIndices.has(i));
  return day1Qs.length ? day1Qs : qs;
}

/* ════════════════════════════════════════════════════════════
   EX2 — DAY 1 RECALL QUESTIONS  (uses Ex2Screen)
════════════════════════════════════════════════════════════ */
function buildEx2RecallD1(day1Ex, currentDay) {
  const qs        = day1Ex.ex2_questions || [];
  const map       = day1Ex.ex2_recall_map || {};
  const indices   = (map[String(currentDay)] || []).map(Number);
  const questions = indices.map(i => qs[i]).filter(Boolean);
  const finalQs   = questions.length ? questions : qs;
  sess._activeRecallQuestions = finalQs;

  Ex2Screen.start({
    questions: finalQs,
    passage:   null,
    isRecall:  true,
    onComplete: (results) => {
      sess._ex2RecallResults = results;
      sess.questionResults.push(...results.map(r => ({ 
        ...r, 
        week:          sess.week, 
        day:           sess.day,
        exercise_type: 'ex2',
        is_recall:     true,
      })));
      let correct = 0;
      results.forEach(r => { if (r.correct) correct++; });
      sess.ex2D1Correct = correct;
      sess.ex2D1Total   = results.length;
      sess.ex2D1Score   = results.length ? Math.round(correct / results.length * 100) : 100;
      nextStep();
    }
  });
}

/* ════════════════════════════════════════════════════════════
   ANALYSIS + SAVE
════════════════════════════════════════════════════════════ */
async function buildAnalysis() {
  setPhase('analysis');
  clearInterval(timerInterval);
  document.getElementById('ex-timer').style.display     = 'none';
  document.getElementById('ex-timer-lbl').style.display = 'none';

  const totalTime  = Math.floor((Date.now() - sess.startTime) / 1000);
  const dbEx1Score = sess.ex1Score;
  const dbEx2Score = sess.ex2Score;

  // ── Save session ──────────────────────────────────────────────────
  let savedSession = null;
  try {
    savedSession = await rdSaveSession({
      user_id:          currentUser.id,
      exercise_id:      sess.dayEx.id,
      week:             sess.week,
      day:              sess.day,
      session_type:     sess.isRecallDay ? 'recall' : 'normal',
      ex1_recall_time:  sess.phaseTimes['ex1-recall'] || sess.phaseTimes['ex1-recall-day'] || null,
      ex1_score:        dbEx1Score != null ? dbEx1Score : null,
      ex1_correct:      sess.ex1Correct  != null ? sess.ex1Correct  : null,
      ex1_total:        sess.ex1Total    != null ? sess.ex1Total    : null,
      ex1_answers:      sess.ex1Answers  ?? null,
      ex1_d1_score:     sess.ex1D1Score  != null ? sess.ex1D1Score  : null,
      ex1_d1_correct:   sess.ex1D1Correct != null ? sess.ex1D1Correct : null,
      ex1_d1_total:     sess.ex1D1Total  != null ? sess.ex1D1Total  : null,
      ex1_d1_answers:   sess.ex1D1Answers ?? null,
      ex2_time:         sess.phaseTimes['ex2-questions'] || sess.phaseTimes['ex2-questions-day'] || null,
      ex2_score:        dbEx2Score != null ? dbEx2Score : null,
      ex2_correct:      sess.ex2Correct  != null ? sess.ex2Correct  : null,
      ex2_total:        sess.ex2Total    != null ? sess.ex2Total    : null,
      ex2_d1_score:     sess.ex2D1Score  != null ? sess.ex2D1Score  : null,
      ex2_d1_correct:   sess.ex2D1Correct != null ? sess.ex2D1Correct : null,
      ex2_d1_total:     sess.ex2D1Total  != null ? sess.ex2D1Total  : null,
      total_time:       totalTime,
    });
  } catch (e) {
    console.error('Session save failed:', e);
  }

  // ── Save per-question results ─────────────────────────────────────
  if (savedSession?.id && sess.questionResults.length) {
    try {
      await rdSaveQuestionResults(
        sess.questionResults.map(r => ({
          ...r,
          session_id:    savedSession.id,
          user_id:       currentUser.id,
          exercise_type: r.exercise_type || 'ex2',
          is_recall:     r.is_recall     || false,
        }))
      );
    } catch (e) {
      console.error('Question results save failed:', e);
    }
  }

  // ── Advance day ───────────────────────────────────────────────────
  const nextDay  = sess.day >= 7 ? 1 : sess.day + 1;
  const nextWeek = sess.day >= 7 ? sess.week + 1 : sess.week;
  await rdUpsertState(currentUser.id, nextDay, nextWeek);
  userState = { current_day: nextDay, current_week: nextWeek };

  // ── Build analysis UI ─────────────────────────────────────────────
  const todayAnswers  = Object.fromEntries((sess._ex2Results       || []).map(r => [r.question_index, r.chosen]));
  const recallAnswers = Object.fromEntries((sess._ex2RecallResults || []).map(r => [r.question_index, r.chosen]));
  const todayTimes    = Object.fromEntries((sess._ex2Results       || []).map(r => [r.question_index, r.time_taken]));
  const recallTimes   = Object.fromEntries((sess._ex2RecallResults || []).map(r => [r.question_index, r.time_taken]));

  const reviewToday  = buildReviewHtml(sess._activeQuestions       || [], todayAnswers,  todayTimes,  "Today's Questions");
  const reviewRecall = sess.isRecallDay
    ? buildReviewHtml(sess._activeRecallQuestions || [], recallAnswers, recallTimes, '🔁 Day 1 Recall Questions')
    : '';

  // ── Ex1 chain answer review ───────────────────────────────────────
  function buildEx1ReviewHtml(answers, label) {
    if (!answers?.length) return '';
    let html = `<div style="margin-bottom:1.5rem">
      <div class="ex-section-hd">${label}</div>
      <div style="display:flex;flex-direction:column;gap:6px;margin-top:8px">`;
    answers.forEach(a => {
      const ok = a.ok;
      html += `<div style="display:flex;align-items:baseline;gap:12px;font-family:'DM Mono',monospace;font-size:10px;padding:7px 10px;border-radius:var(--radius-sm);border:1px solid ${ok ? 'var(--green-border)' : 'var(--red-border)'};background:${ok ? 'var(--green-bg)' : 'var(--red-bg)'}">
        <span style="color:var(--text3);min-width:60px">node ${a.node_idx + 1}</span>
        <span style="color:var(--text1);flex:1">${a.user_answer || '—'}</span>
        <span style="color:${ok ? 'var(--green)' : 'var(--red)'}; font-weight:600">${ok ? '✓' : '✗'}</span>
        ${!ok ? `<span style="color:var(--text3)">→ ${a.correct_answer}</span>` : ''}
      </div>`;
    });
    html += `</div></div>`;
    return html;
  }

  const ex1Review   = buildEx1ReviewHtml(sess.ex1Answers,   "Ex1 — Today's Chain Recall");
  const ex1D1Review = buildEx1ReviewHtml(sess.ex1D1Answers, 'Ex1 — 🔁 Day 1 Chain Recall');

  const content = document.getElementById('ex-content');
  content.innerHTML = `<div style="animation:slideUp .4s ease forwards;opacity:0">
    <div class="an-title">Analysis · Week ${sess.week} Day ${sess.day}</div>

    <div class="score-row">
      <div class="score-huge">${dbEx2Score != null ? dbEx2Score + '%' : '—'}</div>
      <div class="score-sub">
        ${dbEx2Score    != null ? `${sess.ex2Correct}/${sess.ex2Total} today's questions correct` : ''}
        ${sess.ex1Score    != null ? `<br>Today's chain recall: ${sess.ex1Score}%`     : ''}
        ${sess.ex1D1Score  != null ? `<br>Day 1 chain recall: ${sess.ex1D1Score}%`     : ''}
        ${sess.ex2D1Score  != null ? `<br>Day 1 recall questions: ${sess.ex2D1Score}%` : ''}
      </div>
    </div>

    ${ex1D1Review}
    ${ex1D1Review && ex1Review ? '<div class="an-divider" style="margin:1.5rem 0"></div>' : ''}
    ${ex1Review}
    ${(ex1D1Review || ex1Review) && (reviewRecall || reviewToday) ? '<div class="an-divider" style="margin:1.5rem 0"></div>' : ''}

    ${reviewRecall}
    ${reviewRecall && reviewToday ? '<div class="an-divider" style="margin:2rem 0"></div>' : ''}
    ${reviewToday}

    <div class="time-tbl">${buildTimeTbl(totalTime)}</div>
    <div style="margin-top:1.5rem">
      <button class="rd-btn solid" onclick="finishSession()">back to dashboard</button>
    </div>
  </div>`;
}

function buildReviewHtml(questions, answers, times, label) {
  if (!questions.length) return '';
  let html = `<div style="margin-bottom:1.5rem"><div class="ex-section-hd">${label}</div></div>`;
  questions.forEach((q, i) => {
    const ua   = answers[i];
    const time = times[i];
    const ops  = (q.options || []).map((o, oi) => {
      let cls  = 'an-opt neutral';
      if (oi === q.correct)                cls = 'an-opt correct';
      else if (oi === ua && oi !== q.correct) cls = 'an-opt wrong';
      const mark = oi === q.correct ? ' ✓' : (oi === ua && oi !== q.correct ? ' ✗' : '');
      return `<div class="${cls}"><span class="an-key">${'ABCD'[oi]}</span>${o}${mark}</div>`;
    }).join('');
    html += `<div class="an-block">
      <div class="q-num" style="display:flex;align-items:center;gap:8px">
        Q${i + 1}
        <span class="q-type-badge" style="font-family:'DM Mono',monospace;font-size:8px;padding:1px 5px;border-radius:2px;background:var(--chain-bg);color:var(--chain-text)">${q.type || ''}</span>
        ${time != null ? `<span style="font-family:'DM Mono',monospace;font-size:9px;color:var(--text3);margin-left:auto">${time}s spent</span>` : ''}
      </div>
      <div class="an-q-text">${q.text || ''}</div>
      <div class="an-opts">${ops}</div>
      <div class="an-reason"><strong>Why ${'ABCD'[q.correct]} is correct:</strong> ${q.reason || ''}</div>
    </div>${i < questions.length - 1 ? '<div class="an-divider"></div>' : ''}`;
  });
  return html;
}

function buildTimeTbl(totalTime) {
  const labels = {
    'ex1-read':          'Ex1 reading',
    'ex1-read-day':      'Ex1 reading',
    'ex1-recall':        'Ex1 recall',
    'ex1-recall-day':    'Ex1 recall',
    'ex1-recall-d1':     'Day 1 chain recall',
    'ex2-recall-d1':     'Day 1 Q recall',
    'ex2-questions':     'Ex2 questions',
    'ex2-questions-day': 'Ex2 questions',
  };
  const rows = [];
  for (const [step, t] of Object.entries(sess.phaseTimes)) {
    const lbl = labels[step];
    if (lbl) rows.push(`<div><span class="tl">${lbl}</span><span class="tv">${fmt(t)}</span></div>`);
  }
  rows.push(`<div><span class="tl">Session total</span><span class="tv">${fmt(totalTime)}</span></div>`);
  return rows.join('');
}

async function finishSession() {
  clearInterval(timerInterval);
  document.getElementById('ex-timer').style.display     = '';
  document.getElementById('ex-timer-lbl').style.display = '';
  document.getElementById('nav-label').textContent = 'Reading Practice';
  await renderDashboard();
  showScreen('dashboard');
}

/* ════════════════════════════════════════════════════════════
   TIMER
════════════════════════════════════════════════════════════ */
let timerInterval = null;
function startTimer() {
  clearInterval(timerInterval);
  timerInterval = setInterval(() => {
    const s  = Math.floor((Date.now() - sess.phaseStart) / 1000);
    const el = document.getElementById('ex-timer');
    el.textContent = fmt(s);
    el.className   = 'ex-timer' + (s >= 300 ? ' over' : s >= 180 ? ' warn' : '');
  }, 500);
}

/* ════════════════════════════════════════════════════════════
   UTILS
════════════════════════════════════════════════════════════ */
const PHASE_LABELS = {
  'ex1-read':          'reading phase',
  'ex1-read-day':      'reading phase',
  'ex1-recall':        'chain recall',
  'ex1-recall-day':    'chain recall',
  'ex1-recall-d1':     '🔁 day 1 chain recall',
  'ex2-questions':     'comprehension',
  'ex2-questions-day': 'comprehension',
  'ex2-recall-d1':     '🔁 day 1 q recall',
  'analysis':          'analysis',
};

function setPhase(step) {
  document.getElementById('ex-phase').textContent     = PHASE_LABELS[step] || step;
  document.getElementById('ex-timer-lbl').textContent = PHASE_LABELS[step] || '';
  const timerEl = document.getElementById('ex-timer');
  timerEl.className   = 'ex-timer';
  timerEl.textContent = '0:00';
  sess.phaseStart = Date.now();
}

function closeEnough(u, c) {
  const norm = s => s.toLowerCase().replace(/[^a-z0-9]/g, ' ').replace(/\s+/g, ' ').trim();
  const un   = norm(u), cn = norm(c);
  if (un === cn) return true;
  const cw = cn.split(' '), uw = un.split(' ');
  return cw.filter(w => uw.includes(w)).length >= Math.ceil(cw.length * 0.55);
}

function fmt(s) {
  if (s === null || s === undefined || s === '') return '—';
  return Math.floor(s / 60) + ':' + String(s % 60).padStart(2, '0');
}
